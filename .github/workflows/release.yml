name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          token: ''

      - name: Debug npm config
        run: |
          echo "=== npm config ==="
          npm config list
          echo "=== .npmrc contents ==="
          cat ~/.npmrc 2>/dev/null || echo "No .npmrc"
          echo "=== env vars ==="
          env | grep -i "NPM\|NODE\|TOKEN" || true

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public
