name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          token: ''

      - name: Configure npm for Trusted Publishing
        run: |
          # Remove any injected auth tokens
          rm -f ~/.npmrc
          npm config set registry https://registry.npmjs.org/
          npm config set auth-type web
          # Verify no token is set
          npm config list | grep -i auth || echo "No auth config found (good)"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public
