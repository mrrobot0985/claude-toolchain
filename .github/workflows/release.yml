name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run dry-run instead of actual publish'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ] || [ "$DRY_RUN" = "true" ]; then
            echo "Dry run: verifying build artifacts"
            test -d dist/ && ls -la dist/
            test -f dist/cli.js && echo "OK: dist/cli.js exists"
            test -f package.json && echo "OK: package.json exists"
            echo "Dry run complete — tarball would be published to npm"
          else
            unset NODE_AUTH_TOKEN
            npm publish --provenance --access public
          fi
        env:
          DRY_RUN: ${{ env.DRY_RUN }}
